<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>GYMORA — Admin</title>
  <meta name="theme-color" content="#0a0a0a" />
  <link rel="icon" type="image/png" href="icon-192.png" />
  <style>
    @font-face { font-family: "Barlow Condensed"; src: url("fonts/BarlowCondensed-Bold.ttf") format("truetype"); font-weight: 700; font-display: swap; }
    @font-face { font-family: "Barlow Condensed"; src: url("fonts/BarlowCondensed-SemiBold.ttf") format("truetype"); font-weight: 600; font-display: swap; }
    :root { color-scheme: dark; --accent: #22c55e; --bg: #0a0a0a; --surface: #141414; --surface-2: #1d1d1d; --text: #f2f4f2; --muted: #9aa39e; --border: #262a27; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
    h1, h2, .brand-name, .tile .n { font-family: "Barlow Condensed", sans-serif; text-transform: uppercase; letter-spacing: .02em; }
    button { font-family: inherit; cursor: pointer; }

    /* ---- login ---- */
    #login { min-height: 100dvh; display: grid; place-items: center; padding: 20px; }
    .login-card { width: 100%; max-width: 380px; background: var(--surface); border: 1px solid var(--border); border-radius: 22px; padding: 30px 26px; text-align: center; }
    .login-card img { width: 74px; height: 74px; border-radius: 18px; margin-bottom: 10px; }
    .login-card h1 { font-size: 30px; font-weight: 700; }
    .login-card .sub { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
    .login-card label { display: block; text-align: start; font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin: 12px 0 5px; }
    .login-card input { width: 100%; padding: 12px 14px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface-2); color: var(--text); font-size: 15px; outline: none; }
    .login-card input:focus { border-color: var(--accent); }
    .err { color: #f87171; font-size: 13px; min-height: 18px; margin-top: 10px; }
    .btn { width: 100%; margin-top: 8px; padding: 13px; border: none; border-radius: 999px; background: linear-gradient(120deg, #16a34a, #4ade80); color: #fff; font-weight: 800; font-size: 15px; }
    .btn:active { transform: scale(.97); }

    /* ---- dashboard shell ---- */
    #dash { display: none; min-height: 100dvh; }
    .top { position: sticky; top: 0; z-index: 5; display: flex; align-items: center; gap: 12px; padding: 12px 18px; background: color-mix(in srgb, var(--surface) 85%, transparent); backdrop-filter: blur(14px); border-bottom: 1px solid var(--border); }
    .top img { width: 38px; height: 38px; border-radius: 10px; }
    .brand-name { font-size: 21px; font-weight: 700; letter-spacing: .08em; }
    .brand-name small { color: var(--accent); font-size: 13px; letter-spacing: .12em; margin-inline-start: 8px; }
    .top .who { margin-inline-start: auto; color: var(--muted); font-size: 13px; }
    .top .out { border: 1px solid var(--border); background: var(--surface-2); color: var(--text); border-radius: 999px; padding: 7px 14px; font-size: 13px; font-weight: 700; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 22px 18px 60px; }
    .src { font-size: 12px; color: var(--muted); margin-bottom: 16px; }
    .src b { color: var(--accent); }

    .tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 26px; }
    .tile { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 16px; }
    .tile .n { font-size: 34px; font-weight: 700; color: var(--accent); line-height: 1.05; }
    .tile .l { font-size: 11.5px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-top: 4px; }

    h2 { font-size: 22px; margin: 26px 0 12px; }
    .tablewrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 16px; background: var(--surface); }
    table { width: 100%; border-collapse: collapse; font-size: 13.5px; min-width: 720px; }
    th, td { text-align: start; padding: 11px 14px; border-bottom: 1px solid var(--border); white-space: nowrap; }
    th { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .06em; }
    tr:last-child td { border-bottom: none; }
    .pill { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 11.5px; font-weight: 700; }
    .pill.ok { background: color-mix(in srgb, var(--accent) 18%, transparent); color: var(--accent); }
    .pill.bad { background: rgba(244, 63, 94, .15); color: #f87171; }
    .pill.role { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
    .act { border: 1px solid var(--border); background: var(--surface-2); color: var(--text); border-radius: 999px; padding: 5px 12px; font-size: 12px; font-weight: 700; margin-inline-end: 6px; }
    .act.danger { color: #f87171; border-color: rgba(244, 63, 94, .35); }
    .bars { display: flex; align-items: flex-end; gap: 8px; height: 90px; padding: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; }
    .bar { flex: 1; background: linear-gradient(180deg, #4ade80, #16a34a); border-radius: 6px 6px 2px 2px; min-height: 3px; }
    .bar-l { text-align: center; font-size: 10px; color: var(--muted); margin-top: 4px; }
    .note { color: var(--muted); font-size: 13px; padding: 14px; }
  </style>
</head>
<body>

  <!-- ============ LOGIN ============ -->
  <section id="login">
    <form class="login-card" id="loginForm">
      <img src="logo-mark.png" alt="" />
      <h1>Admin Console</h1>
      <div class="sub">GYMORA · staff only</div>
      <label>Email</label>
      <input id="aEmail" type="email" autocomplete="username" placeholder="you@email.com" required />
      <label>Password</label>
      <input id="aPw" type="password" autocomplete="current-password" placeholder="••••••••" required />
      <div class="err" id="aErr"></div>
      <button class="btn" type="submit">Open dashboard</button>
    </form>
  </section>

  <!-- ============ DASHBOARD ============ -->
  <section id="dash">
    <header class="top">
      <img src="logo-mark.png" alt="" />
      <div class="brand-name">GYMORA <small>ADMIN</small></div>
      <div class="who" id="who"></div>
      <button class="out" id="signOut">Sign out</button>
    </header>
    <div class="wrap">
      <div class="src" id="srcNote"></div>
      <div class="tiles" id="tiles"></div>

      <h2>This week's check-ins</h2>
      <div class="bars" id="bars"></div>
      <div style="display:flex;gap:8px;padding:0 14px" id="barLabels"></div>

      <h2>Members</h2>
      <div class="tablewrap"><table id="usersTable"></table></div>

      <h2>Gyms</h2>
      <div class="tablewrap"><table id="gymsTable"></table></div>
    </div>
  </section>

  <script src="data.js"></script>
  <script>
  (function () {
    const API = "/api";
    const obf = (pw) => btoa(unescape(encodeURIComponent(pw)));
    const $ = (s) => document.querySelector(s);
    const esc = (s) => String(s == null ? "" : s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    let mode = null;      // "cloud" | "local"
    let token = null;
    let meEmail = null;
    let rows = [];        // normalized users

    /* ---------- auth ---------- */
    async function cloudLogin(email, pw) {
      try {
        const r = await fetch(API + "/login", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ email, password: pw }) });
        if (!r.ok) return null;
        const d = await r.json();
        if (d && d.token && d.profile && d.profile.role === "admin") return d.token;
        return d && d.token ? "not-admin" : null;
      } catch (e) { return null; }
    }
    function localLogin(email, pw) {
      const users = JSON.parse(localStorage.getItem("fj_users") || "[]");
      const u = users.find(x => x.email === email);
      if (u && u.pw === obf(pw) && u.role === "admin") return true;
      if (u && u.pw === obf(pw)) return "not-admin";
      return false;
    }
    $("#loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = $("#aEmail").value.trim().toLowerCase(), pw = $("#aPw").value;
      $("#aErr").textContent = "";
      const c = await cloudLogin(email, pw);
      if (c && c !== "not-admin") { mode = "cloud"; token = c; meEmail = email; return open(); }
      const l = localLogin(email, pw);
      if (l === true) { mode = "local"; meEmail = email; return open(); }
      $("#aErr").textContent = (c === "not-admin" || l === "not-admin")
        ? "That account isn't an admin."
        : "Wrong email or password.";
    });
    $("#signOut").addEventListener("click", () => location.reload());

    /* ---------- data ---------- */
    async function loadUsers() {
      if (mode === "cloud") {
        try {
          const r = await fetch(API + "/admin/users", { headers: { Authorization: "Bearer " + token } });
          if (r.ok) { const d = await r.json(); return d.users || []; }
        } catch (e) {}
        mode = "local"; // cloud unreachable → fall back
      }
      return JSON.parse(localStorage.getItem("fj_users") || "[]").map(u => ({
        email: u.email, name: u.name, role: u.role || "user",
        points: u.points || 0, checkins: (u.checkinDates || []).length,
        checkinDates: u.checkinDates || [], banned: !!u.banned, createdAt: u.createdAt,
      }));
    }
    async function setBanned(email, banned) {
      if (mode === "cloud") {
        const r = await fetch(API + "/admin/users", { method: "PUT", headers: { "Content-Type": "application/json", Authorization: "Bearer " + token }, body: JSON.stringify({ email, banned }) });
        if (!r.ok) { alert((await r.json()).error || "Failed"); return; }
      } else {
        const users = JSON.parse(localStorage.getItem("fj_users") || "[]");
        const i = users.findIndex(x => x.email === email);
        if (i >= 0) { users[i].banned = banned; localStorage.setItem("fj_users", JSON.stringify(users)); }
      }
      open();
    }
    async function removeUser(email) {
      if (!confirm("Delete " + email + "? This can't be undone.")) return;
      if (mode === "cloud") {
        const r = await fetch(API + "/admin/users", { method: "DELETE", headers: { "Content-Type": "application/json", Authorization: "Bearer " + token }, body: JSON.stringify({ email }) });
        if (!r.ok) { alert((await r.json()).error || "Failed"); return; }
      } else {
        const users = JSON.parse(localStorage.getItem("fj_users") || "[]").filter(x => x.email !== email);
        localStorage.setItem("fj_users", JSON.stringify(users));
      }
      open();
    }

    /* ---------- render ---------- */
    const fmt = (ts) => ts ? new Date(ts).toLocaleDateString("en-US", { day: "numeric", month: "short", year: "numeric" }) : "—";
    function dayKey(d) { const x = new Date(d); return x.toISOString().slice(0, 10); }

    async function open() {
      $("#login").style.display = "none";
      $("#dash").style.display = "block";
      $("#who").textContent = meEmail;
      rows = await loadUsers();
      $("#srcNote").innerHTML = mode === "cloud"
        ? "Data source: <b>cloud</b> — all registered accounts across devices."
        : "Data source: <b>this device</b> — the backend wasn't reachable, showing accounts stored in this browser.";

      const totalCheckins = rows.reduce((s, u) => s + (u.checkins || 0), 0);
      const totalPoints = rows.reduce((s, u) => s + (u.points || 0), 0);
      const staff = rows.filter(u => u.role !== "user").length;
      $("#tiles").innerHTML = [
        [rows.length, "Total users"],
        [staff, "Staff accounts"],
        [totalCheckins, "Check-ins"],
        [totalPoints, "Points issued"],
        [GYMS.length, "Gyms listed"],
      ].map(([n, l]) => `<div class="tile"><div class="n">${n}</div><div class="l">${l}</div></div>`).join("");

      // last 7 days check-in bars
      const days = [...Array(7)].map((_, i) => dayKey(Date.now() - (6 - i) * 86400000));
      const counts = days.map(d => rows.reduce((s, u) => s + ((u.checkinDates || []).includes(d) ? 1 : 0), 0));
      const max = Math.max(1, ...counts);
      $("#bars").innerHTML = counts.map(c => `<div class="bar" style="height:${Math.round(c / max * 100)}%" title="${c}"></div>`).join("");
      $("#barLabels").innerHTML = days.map(d => `<div class="bar-l" style="flex:1">${new Date(d).toLocaleDateString("en-US", { weekday: "short" })}</div>`).join("");

      $("#usersTable").innerHTML = `
        <tr><th>Name</th><th>Email</th><th>Role</th><th>Points</th><th>Check-ins</th><th>Joined</th><th>Status</th><th></th></tr>` +
        (rows.length ? rows.map(u => `
        <tr>
          <td><b>${esc(u.name)}</b></td><td>${esc(u.email)}</td>
          <td><span class="pill role">${esc(u.role)}</span></td>
          <td>${u.points}</td><td>${u.checkins}</td><td>${fmt(u.createdAt)}</td>
          <td>${u.banned ? '<span class="pill bad">Banned</span>' : '<span class="pill ok">Active</span>'}</td>
          <td>
            ${u.email === meEmail ? "" : `
              <button class="act" data-ban="${esc(u.email)}" data-to="${u.banned ? 0 : 1}">${u.banned ? "Unban" : "Ban"}</button>
              <button class="act danger" data-del="${esc(u.email)}">Delete</button>`}
          </td>
        </tr>`).join("") : `<tr><td colspan="8" class="note">No accounts yet.</td></tr>`);

      $("#gymsTable").innerHTML = `
        <tr><th>Gym</th><th>Area</th><th>Rating</th><th>Reviews</th><th>From /mo</th><th>Access</th></tr>` +
        GYMS.map(g => `
        <tr>
          <td><b>${esc(g.name.en)}</b></td><td>${esc(g.area.en)}</td>
          <td>★ ${g.rating}</td><td>${g.reviews}</td>
          <td>${Math.min(...g.plans.map(p => Math.round(p.priceJOD / p.months)))} JD</td>
          <td>${esc(g.gender)}</td>
        </tr>`).join("");
    }

    document.addEventListener("click", (e) => {
      const ban = e.target.closest("[data-ban]");
      if (ban) return void setBanned(ban.dataset.ban, ban.dataset.to === "1");
      const del = e.target.closest("[data-del]");
      if (del) return void removeUser(del.dataset.del);
    });
  })();
  </script>
</body>
</html>
